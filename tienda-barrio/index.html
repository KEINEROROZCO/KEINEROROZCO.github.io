<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda de Barrio Online - En Desarrollo</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050816;
            color: #f0f4ff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            border: 1px solid rgba(0, 245, 212, 0.2);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        h1 {
            color: #00f5d4;
            margin-bottom: 20px;
        }
        p {
            color: rgba(240, 244, 255, 0.7);
            line-height: 1.6;
        }
        a {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            color: #050816;
            background-color: #00f5d4;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: opacity 0.3s;
        }
        a:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Tienda de Barrio Online</h1>
        <p>Este proyecto está basado en PHP y MySQL. Actualmente estás viendo una versión alojada en GitHub Pages, que solo soporta archivos estáticos (HTML/CSS/JS).</p>
        <p>El código fuente completo está disponible en el repositorio de GitHub.</p>
        <a href="../index.html">Volver al Portafolio</a>
    </div>
</body>
</html>
